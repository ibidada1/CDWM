<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Come Dine Game</title>

<style>
body {
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
  justify-content: center;
  padding: 30px;
}

.container {
  max-width: 1200px;
  width: 100%;
}

h1 {
  font-size: 48px;
  text-align: center;
}

.card {
  background: #1e1e1e;
  padding: 40px;
  border-radius: 20px;
  margin-bottom: 30px;
  text-align: center;
}

button, input {
  width: 100%;
  padding: 20px;
  margin-top: 20px;
  border-radius: 14px;
  border: none;
  font-size: 22px;
}

button {
  background: #00c896;
  color: white;
  font-weight: bold;
}

#game, #revealScore, #final, #revealBtnWrap {
  display: none;
}

.fullscreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.big-number {
  font-size: 180px;
  font-weight: bold;
}

.result-item {
  font-size: 36px;
  margin: 20px 0;
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.5s ease;
}

.result-item.show {
  opacity: 1;
  transform: translateY(0);
}

.winner {
  font-size: 50px;
  color: gold;
  margin-top: 30px;
}
</style>
</head>

<body>
<div class="container">

<h1>🍽️ Come Dine With Me</h1>

<div class="card" id="setup">
  <button id="startBtn">Start Game</button>
</div>

<div class="card" id="game">
  <h2 id="hostDisplay"></h2>
  <p id="turnDisplay" style="font-size:28px;"></p>

  <input id="score" type="number" min="1" max="10">
  <button id="submitBtn" disabled>Reveal Score</button>
</div>

<div id="revealScore" class="fullscreen">
  <div class="big-number" id="privateScore"></div>
  <div style="font-size:28px;">Click to continue</div>
</div>

<div class="card" id="revealBtnWrap">
  <button id="revealWinnerBtn">🎬 Reveal Results</button>
</div>

<div class="card" id="final">
  <h2 style="font-size:40px;">🏆 Final Results</h2>
  <div id="leaderboard"></div>
  <p>(Click anywhere to reveal next)</p>
  <button id="resetBtn">🔄 Restart Game</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
const STORAGE_KEY = "dine_game_state";

const teams = [
  "Team A",
  "Team B",
  "Team C",
  "Team D"
];

const state = {
  hostsQueue: [],
  currentHostIndex: 0,
  voters: [],
  currentVoterIndex: 0,
  roundScores: [],
  allResults: [],
  tempScore: null,
  revealIndex: 0,
  sortedResults: []
};

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) Object.assign(state, JSON.parse(saved));
}

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

/* 🔥 FIXED: always resets game */
function startGame() {
  localStorage.removeItem(STORAGE_KEY); // clear old data

  state.hostsQueue = shuffle(teams);
  state.currentHostIndex = 0;
  state.allResults = [];
  state.roundScores = [];

  saveState();
  nextHost();
}

function nextHost() {
  if (state.currentHostIndex >= state.hostsQueue.length) {
    game.style.display = "none";
    revealBtnWrap.style.display = "block";
    return;
  }

  const host = state.hostsQueue[state.currentHostIndex];

  state.voters = teams.filter(t => t !== host);
  state.currentVoterIndex = 0;
  state.roundScores = [];

  setup.style.display = "none";
  game.style.display = "block";

  hostDisplay.textContent = `🍽️ Hosting: ${host}`;
  renderTurn();
}

function renderTurn() {
  const voter = state.voters[state.currentVoterIndex];

  turnDisplay.textContent =
    `${voter} (${state.currentVoterIndex + 1}/${state.voters.length})`;

  score.value = "";
  submitBtn.disabled = true;
}

function submitScore() {
  const val = parseInt(score.value);
  if (val < 1 || val > 10) return;

  state.tempScore = val;
  privateScore.textContent = val;

  game.style.display = "none";
  revealScore.style.display = "flex";
}

revealScore.onclick = () => {
  revealScore.style.display = "none";
  game.style.display = "block";

  state.roundScores.push(state.tempScore);
  state.currentVoterIndex++;

  saveState();

  if (state.currentVoterIndex < state.voters.length) {
    renderTurn();
  } else {
    finishRound();
  }
};

function finishRound() {
  const host = state.hostsQueue[state.currentHostIndex];
  const total = state.roundScores.reduce((a,b) => a+b, 0);

  state.allResults.push({ host, total });
  state.currentHostIndex++;

  saveState();
  nextHost();
}

function revealResults() {
  revealBtnWrap.style.display = "none";
  final.style.display = "block";

  state.sortedResults = [...state.allResults].sort((a,b) => a.total - b.total);
  state.revealIndex = 0;
  leaderboard.innerHTML = "";
}

final.onclick = () => {
  const total = state.sortedResults.length;

  if (state.revealIndex < total - 2) {
    const r = state.sortedResults[state.revealIndex];
    const rank = total - state.revealIndex;

    const div = document.createElement("div");
    div.classList.add("result-item");
    div.innerHTML = `${rank}. ${r.host} — ${r.total}/30 ⭐`;

    leaderboard.appendChild(div);
    setTimeout(() => div.classList.add("show"), 50);

    state.revealIndex++;
    return;
  }

  if (state.revealIndex === total - 2) {
    const second = state.sortedResults[total - 2];
    const first = state.sortedResults[total - 1];

    const secondDiv = document.createElement("div");
    secondDiv.classList.add("result-item");
    secondDiv.innerHTML = `2. ${second.host} — ${second.total}/30 ⭐`;

    const firstDiv = document.createElement("div");
    firstDiv.classList.add("result-item");
    firstDiv.innerHTML = `1. ${first.host} — ${first.total}/30 ⭐`;

    leaderboard.appendChild(secondDiv);
    leaderboard.appendChild(firstDiv);

    setTimeout(() => {
      secondDiv.classList.add("show");
      firstDiv.classList.add("show");
    }, 50);

    setTimeout(() => {
      const w = document.createElement("div");
      w.classList.add("winner");
      w.textContent = `🏆 WINNER: ${first.host}`;
      leaderboard.appendChild(w);

      launchConfetti();
    }, 400);

    state.revealIndex = total;
  }
};

function launchConfetti() {
  const duration = 5000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({ particleCount: 15, angle: 60, spread: 90, origin: { x: 0, y: 0.6 } });
    confetti({ particleCount: 15, angle: 120, spread: 90, origin: { x: 1, y: 0.6 } });
    confetti({ particleCount: 20, spread: 120, origin: { x: 0.5, y: 0.5 } });
    confetti({
      particleCount: 10,
      angle: Math.random() * 360,
      spread: 100,
      origin: { x: Math.random(), y: Math.random() * 0.6 }
    });

    if (Date.now() < end) requestAnimationFrame(frame);
  })();
}

function resetGame() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

/* restore only if mid-game */
function restoreUI() {
  if (state.currentHostIndex < state.hostsQueue.length && state.hostsQueue.length > 0) {
    setup.style.display = "none";
    game.style.display = "block";
    hostDisplay.textContent =
      `🍽️ Hosting: ${state.hostsQueue[state.currentHostIndex]}`;
    renderTurn();
  }
}

startBtn.onclick = startGame;
submitBtn.onclick = submitScore;
revealWinnerBtn.onclick = revealResults;
resetBtn.onclick = resetGame;

score.oninput = () => {
  const val = parseInt(score.value);
  submitBtn.disabled = !(val >= 1 && val <= 10);
};

score.onkeypress = e => {
  if (e.key === "Enter" && !submitBtn.disabled) submitScore();
};

loadState();
restoreUI();
</script>

</body>
</html>
